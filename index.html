<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>レース収支管理</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0ea5c8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="収支管理">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── 入力タブ ── -->
  <div id="tab-input" class="tab-content active">
    <header class="page-header">
      <h1>新規登録</h1>
      <div class="header-right">
        <div class="sync-indicator" id="sync-indicator"></div>
        <button class="btn-sync" aria-label="同期">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
    </header>
    <main class="page-main">
      <div class="form-group">
        <label for="input-date">日付</label>
        <input type="date" id="input-date">
      </div>
      <div class="form-group">
        <label for="input-buytype">種別</label>
        <select id="input-buytype">
          <option value="ノリ">ノリ</option>
          <option value="単舞">単舞</option>
        </select>
      </div>
      <div class="form-group" id="input-member-row" style="display:none">
        <label for="input-member">メンバー</label>
        <select id="input-member">
          <option value="">選択してください</option>
          <option value="大迫">大迫</option>
          <option value="今伊">今伊</option>
          <option value="今尾">今尾</option>
          <option value="藤原">藤原</option>
        </select>
      </div>
      <div class="form-group">
        <label for="input-sport">競技</label>
        <select id="input-sport">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-group">
        <label for="input-venue">場名</label>
        <select id="input-venue" disabled>
          <option value="">競技を先に選択</option>
        </select>
      </div>
      <div class="form-group">
        <label for="input-race">レース番号</label>
        <select id="input-race">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-group">
        <label for="input-bet">掛け金</label>
        <div class="input-row">
          <input type="number" id="input-bet" placeholder="例：1000" min="1" step="100" inputmode="numeric">
          <span class="unit">円</span>
        </div>
      </div>
      <div class="form-group">
        <label for="input-payout">払戻金 <span class="label-note">（後から入力可）</span></label>
        <div class="input-row">
          <input type="number" id="input-payout" placeholder="0" min="0" step="100" inputmode="numeric">
          <span class="unit">円</span>
        </div>
      </div>
      <div class="form-group">
        <label for="input-memo">メモ <span class="label-note">（任意）</span></label>
        <input type="text" id="input-memo" placeholder="例：馬連 3-7 BOX">
      </div>
      <button class="btn-primary btn-full" id="btn-register">登録する</button>
    </main>
  </div>

  <!-- ── 結果入力タブ ── -->
  <div id="tab-results" class="tab-content">
    <header class="page-header">
      <h1>結果入力</h1>
      <button class="btn-sync" aria-label="同期">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </header>
    <main class="page-main">
      <div id="pending-empty" class="empty-state" style="display:none">
        結果待ちのレースはありません
      </div>
      <div id="pending-list"></div>
    </main>
  </div>

  <!-- ── 集計タブ ── -->
  <div id="tab-summary" class="tab-content">
    <header class="page-header">
      <h1>集計</h1>
      <button class="btn-sync" aria-label="同期">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </header>
    <main class="page-main">
      <!-- 期間フィルター -->
      <div class="filter-bar" id="period-filter-bar">
        <button class="filter-btn active" data-period="month">今月</button>
        <button class="filter-btn" data-period="today">今日</button>
        <button class="filter-btn" data-period="select-month">指定月</button>
        <button class="filter-btn" data-period="year">年度別</button>
        <button class="filter-btn" data-period="all">全期間</button>
      </div>
      <div id="period-extra" style="display:none" class="period-picker">
        <select id="period-select"></select>
      </div>

      <!-- 競技タブ -->
      <div class="sport-tab-bar" id="sport-tab-bar">
        <!-- JS で生成 -->
      </div>

      <!-- メンバー選択（個人別タブ） -->
      <div id="section-member-select" style="display:none">
        <div id="member-selector" class="member-selector"></div>
      </div>

      <!-- KPI -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">投入合計</div>
          <div class="kpi-value" id="kpi-bet">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">回収合計</div>
          <div class="kpi-value" id="kpi-payout">—</div>
        </div>
        <div class="kpi-card kpi-wide">
          <div class="kpi-label">収支</div>
          <div class="kpi-value" id="kpi-profit">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">ROI</div>
          <div class="kpi-value" id="kpi-roi">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">的中率</div>
          <div class="kpi-value" id="kpi-hitrate">—</div>
        </div>
      </div>

      <!-- 競技別収支（個人別タブ） -->
      <div class="chart-section" id="section-individual-sport" style="display:none">
        <div class="chart-title">競技別収支</div>
        <div class="chart-wrap chart-sport-roi" id="wrap-individual-sport"><canvas id="chart-individual-sport"></canvas></div>
      </div>

      <!-- 月別収支（年度別のみ） -->
      <div class="chart-section" id="section-monthly" style="display:none">
        <div class="chart-title">月別収支</div>
        <div class="chart-wrap chart-monthly"><canvas id="chart-monthly"></canvas></div>
      </div>

      <!-- 競技別ROI比較（全体タブ専用） -->
      <div class="chart-section" id="section-sport-roi" style="display:none">
        <div class="chart-title">競技別ROI比較</div>
        <div class="chart-wrap chart-sport-roi" id="wrap-sport-roi"><canvas id="chart-sport-roi"></canvas></div>
      </div>

      <!-- 月別収支推移（全体タブ専用） -->
      <div class="chart-section" id="section-monthly-trend" style="display:none">
        <div class="chart-title">月別収支推移</div>
        <div class="chart-wrap chart-monthly" id="wrap-monthly-trend"><canvas id="chart-monthly-trend"></canvas></div>
      </div>

      <!-- 回収率移動平均（全体タブ専用） -->
      <div class="chart-section" id="section-moving-avg" style="display:none">
        <div class="chart-title">回収率移動平均（直近30件）</div>
        <div class="chart-wrap"><canvas id="chart-moving-avg"></canvas></div>
      </div>

      <!-- 場別ROI -->
      <div class="chart-section" id="section-venue">
        <div class="chart-title">場別ROI</div>
        <div class="chart-wrap chart-tall" id="wrap-venue"><canvas id="chart-venue"></canvas></div>
      </div>

      <!-- レース番号別ROI -->
      <div class="chart-section" id="section-race">
        <div class="chart-title">レース番号別ROI</div>
        <div class="chart-wrap" id="wrap-race"><canvas id="chart-race"></canvas></div>
      </div>

      <!-- 曜日別ROI -->
      <div class="chart-section" id="section-day">
        <div class="chart-title">曜日別ROI</div>
        <div class="chart-wrap"><canvas id="chart-day"></canvas></div>
      </div>
    </main>
  </div>

  <!-- ── 履歴タブ ── -->
  <div id="tab-history" class="tab-content">
    <header class="page-header">
      <h1>履歴</h1>
      <button class="btn-sync" aria-label="同期">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </header>
    <main class="page-main">
      <div id="history-empty" class="empty-state" style="display:none">
        記録がありません
      </div>
      <div id="history-list"></div>
    </main>
  </div>

</div><!-- #app -->

<!-- ── ボトムナビ ── -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-tab="input">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    <span>入力</span>
  </button>
  <button class="nav-btn" data-tab="results">
    <span class="nav-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      <span class="nav-badge" id="nav-badge" style="display:none">0</span>
    </span>
    <span>結果入力</span>
  </button>
  <button class="nav-btn" data-tab="summary">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
    </svg>
    <span>集計</span>
  </button>
  <button class="nav-btn" data-tab="history">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <span>履歴</span>
  </button>
</nav>

<!-- ── 払戻入力モーダル ── -->
<div id="payout-overlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>払戻金を入力</h2>
    <div class="payout-info" id="payout-info"></div>
    <div class="form-group">
      <label for="payout-input">払戻金（円）　0 = ハズレ</label>
      <div class="input-row">
        <input type="number" id="payout-input" placeholder="例：3600" min="0" step="100" inputmode="numeric">
        <span class="unit">円</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="payout-save">確定</button>
      <button class="btn-secondary" id="payout-close">キャンセル</button>
    </div>
  </div>
</div>

<!-- ── 編集モーダル ── -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>記録を編集</h2>
    <div class="form-group">
      <label for="modal-date">日付</label>
      <input type="date" id="modal-date">
    </div>
    <div class="form-group">
      <label for="modal-buytype">種別</label>
      <select id="modal-buytype">
        <option value="ノリ">ノリ</option>
        <option value="単舞">単舞</option>
      </select>
    </div>
    <div class="form-group" id="modal-member-row" style="display:none">
      <label for="modal-member">メンバー</label>
      <select id="modal-member">
        <option value="">選択してください</option>
        <option value="大迫">大迫</option>
        <option value="今伊">今伊</option>
        <option value="今尾">今尾</option>
        <option value="藤原">藤原</option>
      </select>
    </div>
    <div class="form-group">
      <label for="modal-sport">競技</label>
      <select id="modal-sport"></select>
    </div>
    <div class="form-group">
      <label for="modal-venue">場名</label>
      <select id="modal-venue"></select>
    </div>
    <div class="form-group">
      <label for="modal-race">レース番号</label>
      <select id="modal-race"></select>
    </div>
    <div class="form-group">
      <label for="modal-bet">掛け金（円）</label>
      <div class="input-row">
        <input type="number" id="modal-bet" min="1" step="100" inputmode="numeric">
        <span class="unit">円</span>
      </div>
    </div>
    <div class="form-group">
      <label for="modal-payout">払戻金（円）<span class="label-note">（空欄 = 結果待ちに戻す）</span></label>
      <div class="input-row">
        <input type="number" id="modal-payout" placeholder="未入力 = 結果待ち" min="0" step="100" inputmode="numeric">
        <span class="unit">円</span>
      </div>
    </div>
    <div class="form-group">
      <label for="modal-memo">メモ</label>
      <input type="text" id="modal-memo">
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="modal-save">保存</button>
      <button class="btn-danger" id="modal-delete">削除</button>
      <button class="btn-secondary" id="modal-close">閉じる</button>
    </div>
  </div>
</div>

<!-- ── トースト通知 ── -->
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
